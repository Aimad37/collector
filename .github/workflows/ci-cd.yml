name: CI/CD Collector

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: collector
          POSTGRES_USER: collector_user
          POSTGRES_PASSWORD: collector_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: collector_user
          RABBITMQ_DEFAULT_PASS: collector_pass
        ports:
          - 5672:5672

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        working-directory: ./backend
        run: mvn clean compile -B

      - name: Run tests
        working-directory: ./backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/collector
          SPRING_DATASOURCE_USERNAME: collector_user
          SPRING_DATASOURCE_PASSWORD: collector_pass
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_USERNAME: collector_user
          SPRING_RABBITMQ_PASSWORD: collector_pass
          KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/collector
        run: mvn test -B

      - name: Build Docker image backend
        working-directory: ./backend
        run: docker build -t collector-backend .

      - name: Build Docker image frontend
        working-directory: ./frontend
        run: docker build -t collector-frontend .

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency Check
        working-directory: ./backend
        run: mvn dependency-check:check -B
        continue-on-error: true

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: backend/target/dependency-check-report.html