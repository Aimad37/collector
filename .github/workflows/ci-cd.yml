name: CI/CD Collector

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ─────────────────────────────────────
  # JOB 1 — Build Backend
  # ─────────────────────────────────────
  build:
    name: 🔨 Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        working-directory: ./backend
        run: mvn clean compile -B

  # ─────────────────────────────────────
  # JOB 2 — Tests Backend JUnit
  # ─────────────────────────────────────
  test-backend:
    name: 🧪 Tests Backend JUnit
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: collector
          POSTGRES_USER: collector_user
          POSTGRES_PASSWORD: collector_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: collector_user
          RABBITMQ_DEFAULT_PASS: collector_pass
        ports:
          - 5672:5672

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests + JaCoCo
        working-directory: ./backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/collector
          SPRING_DATASOURCE_USERNAME: collector_user
          SPRING_DATASOURCE_PASSWORD: collector_pass
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_USERNAME: collector_user
          SPRING_RABBITMQ_PASSWORD: collector_pass
          KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/collector
        run: mvn test jacoco:report -B

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 30

  # ─────────────────────────────────────
  # JOB 3 — Tests E2E Playwright
  # ─────────────────────────────────────
  test-e2e:
    name: 🎭 Tests E2E Playwright
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Cache Playwright browsers
        uses: actions/cache@v3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: ./frontend
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: ./frontend
        run: npx playwright test --workers=3

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  # ─────────────────────────────────────
  # JOB 4 — Security Scan OWASP
  # ─────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan OWASP
    runs-on: ubuntu-latest
    needs: test-e2e

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency Check
        working-directory: ./backend
        run: mvn dependency-check:check -B -Dnvd.api.key=${{ secrets.NVD_API_KEY }} -Dnvd.api.delay=6000 || echo "OWASP scan skipped"
        continue-on-error: true

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: backend/target/dependency-check-report.html
          retention-days: 30

  # ─────────────────────────────────────
  # JOB 5 — Build Images Docker
  # ─────────────────────────────────────
  build-images:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package backend
        working-directory: ./backend
        run: mvn clean package -DskipTests -B

      - name: Build Docker image backend
        working-directory: ./backend
        run: docker build -t collector-backend:latest .

      - name: Build Docker image frontend
        working-directory: ./frontend
        run: docker build -t collector-frontend:latest .